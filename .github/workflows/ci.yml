name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint (warning caps are the as-any ratchet — lower, never raise)
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      # E1 — claude-plugin/server/ is generated-but-committed (the marketplace
      # ships the git repo). A stale bundle means marketplace users run old
      # code; fail loudly instead.
      - name: Plugin bundle staleness gate
        # -c core.filemode=false: esbuild marks shebanged outputs executable;
        # contributor filesystems (WSL /mnt/c) can't represent that faithfully.
        # Content staleness is what we gate, not mode bits.
        # Review NIT — `git diff` is blind to UNTRACKED emissions (a newly
        # generated file the author forgot to `git add` would pass silently);
        # porcelain catches both modified and untracked.
        run: test -z "$(git -c core.filemode=false status --porcelain -- claude-plugin/server)" || (git -c core.filemode=false status --porcelain -- claude-plugin/server && echo "::error::claude-plugin/server is stale — run pnpm build and commit the result" && exit 1)

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # The e2e specs boot a real daemon from the built dist, so build first.
      - name: Build
        run: pnpm build

      - name: Install Chromium
        run: pnpm --filter @deeppairing/mcp-server exec playwright install --with-deps chromium

      - name: E2E (companion UI bootstrap + demo)
        run: pnpm --filter @deeppairing/mcp-server test:e2e
